name: Build & Push (CAESAR)

# Собирает образы сервера (с фронтом внутри) и Telegram-бота
# и публикует их в GitHub Container Registry (GHCR).
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_SERVER: ${{ github.repository }}-server
  IMAGE_BOT: ${{ github.repository }}-bot

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # нужно для пуша в GHCR через GITHUB_TOKEN

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------- Сервер (.NET + React-клиент) ----------
      - name: Server metadata
        id: meta_server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_SERVER }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: CAESAR.Server/Dockerfile
          push: true
          tags: ${{ steps.meta_server.outputs.tags }}
          labels: ${{ steps.meta_server.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------- Telegram-бот ----------
      - name: Bot metadata
        id: meta_bot
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BOT }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push bot
        uses: docker/build-push-action@v6
        with:
          context: ./bot
          file: bot/Dockerfile
          push: true
          tags: ${{ steps.meta_bot.outputs.tags }}
          labels: ${{ steps.meta_bot.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

