services:
  caesar.server:
    image: ${DOCKER_REGISTRY-}caesarserver
    build:
      context: .
      dockerfile: CAESAR.Server/Dockerfile
  db:
    image: postgres
    container_name: caesar_postgresDB
    environment:
      POSTGRES_USER: caesar_admin
      POSTGRES_PASSWORD: caesar_password
      POSTGRES_DB: caesar_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

volumes:
  pgdata: